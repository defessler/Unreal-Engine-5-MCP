name: MCP server tests

# Builds the standalone MCP server + doctest suite via the CMake fallback
# (Plugins/BlueprintReader/Tests/CMakeLists.txt) and runs the mock-backend
# doctest suite. The server + tests are pure C++20 (bCompileAgainstEngine=false,
# vendored json/fmt/doctest) so they build with NO Unreal Engine — exactly what
# a hosted runner can do. The live/commandlet cases auto-skip without the engine
# env vars. (UBT-based editor-module + Program-target builds need an engine and
# are not run here.)

on:
  push:
    branches: [main]
    paths:
      - 'Plugins/BlueprintReader/Tests/**'
      - '.github/workflows/mcp-tests.yml'
  pull_request:
    paths:
      - 'Plugins/BlueprintReader/Tests/**'
      - '.github/workflows/mcp-tests.yml'

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: Configure (CMake + Ninja)
        # Debug (/Od): CI verifies correctness, not perf. The optimizing build
        # (/O2) runs the compiler out of heap on the huge BlueprintTools.cpp TU
        # (C1060) on the hosted runner's limited RAM; /Od compiles comfortably.
        run: cmake -S Plugins/BlueprintReader/Tests -B build/mcp -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build (MCP server + doctest suite)
        # -j 1 (serial): several heavy TUs (BlueprintTools.cpp, ToolsetMeta.cpp,
        # test_editor_subscriptions.cpp) each need a lot of compiler heap. Even
        # -j 2 intermittently pairs two of them and exhausts the hosted runner's
        # RAM (C1060). Serial guarantees one cl at a time so each gets the full
        # runner memory. Slower (~8-10 min) but reliable; CI correctness over speed.
        run: cmake --build build/mcp -j 1

      - name: Run doctest suite (mock backend)
        shell: pwsh
        env:
          BP_READER_BACKEND: mock
        run: |
          & "$env:GITHUB_WORKSPACE\Plugins\BlueprintReader\Binaries\Win64\BlueprintReaderMcpTests.exe"
          if ($LASTEXITCODE -ne 0) { Write-Host "doctest suite failed ($LASTEXITCODE)"; exit 1 }
          Write-Host "doctest suite passed."

      - name: Tool catalog drift check
        # Fails if a tool was added/changed without regenerating the catalog
        # (docs/TOOLS.md + docs/tools.json). Keeps the single source of truth
        # for tool counts/names honest. Regenerate with the same script sans
        # -Check. Descriptor output is build-config-independent, so the CI
        # Debug exe produces the same catalog as a local RelWithDebInfo build.
        shell: pwsh
        run: pwsh Plugins/BlueprintReader/Scripts/Dump-Tools.ps1 -Check
