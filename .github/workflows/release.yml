name: Release

# Builds and publishes three release assets on every v* tag push:
#
#   1. BlueprintReader-vX.Y.Z-plugin.zip
#      Complete plugin bundle: the entire Plugins/BlueprintReader/ tree with the
#      prebuilt server exe already in Binaries/Win64/. Drop the folder into
#      <Project>/Plugins/BlueprintReader/ and run Setup-Plugin.bat — done.
#
#   2. BlueprintReader-vX.Y.Z-toolbox-win64-setup.exe
#      Electron GUI installer (Install / Providers / Tester / Update panels).
#      Built from Plugins/BlueprintReader/Toolbox/ via electron-builder + NSIS.
#
#   3. BlueprintReaderMcp-vX.Y.Z-win64.zip  (backward-compat server-only bundle)
#      Just the exe + fixtures — for users who only need the server binary.
#
# workflow_dispatch: builds all three and uploads as workflow artifacts (no Release).

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create / upload release assets

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history + tags so the git-hash stamp resolves

      - name: Set up MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      # ── 1. Build the MCP server (CMake, engine-free) ──────────────────────
      - name: Configure (CMake + Ninja, RelWithDebInfo)
        run: cmake -S Plugins/BlueprintReader/Tests -B build/mcp -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build MCP server + tests
        # Serial: heavy TUs each need lots of compiler heap; -j 1 avoids OOM.
        run: cmake --build build/mcp -j 1

      - name: Smoke test (mock suite + --version)
        shell: pwsh
        env:
          BP_READER_BACKEND: mock
        run: |
          & "$env:GITHUB_WORKSPACE\Plugins\BlueprintReader\Binaries\Win64\BlueprintReaderMcpTests.exe"
          if ($LASTEXITCODE -ne 0) { Write-Host "doctest suite failed ($LASTEXITCODE)"; exit 1 }
          & "$env:GITHUB_WORKSPACE\Plugins\BlueprintReader\Binaries\Win64\BlueprintReaderMcp.exe" --version

      # ── 2. Build the Toolbox Electron app ─────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Toolbox dependencies
        working-directory: Plugins/BlueprintReader/Toolbox
        run: npm install

      - name: Build Toolbox (Electron + NSIS installer)
        working-directory: Plugins/BlueprintReader/Toolbox
        shell: pwsh
        run: |
          npm run dist
          # electron-builder bundles its own NSIS and writes to dist/ (inside Toolbox/).
          # electron-builder.config.json sets output to ../Binaries/Toolbox/ so the .exe
          # lands at Plugins/BlueprintReader/Binaries/Toolbox/<name> Setup <ver>.exe
          # Locate the portable exe electron-builder wrote to Binaries/Toolbox/.
          # Search broadly in case the output path resolves differently on the runner.
          $setup = Get-ChildItem -Recurse `
            -Path "$env:GITHUB_WORKSPACE\Plugins\BlueprintReader" `
            -ErrorAction SilentlyContinue |
            Where-Object { $_.Extension -eq '.exe' -and $_.Name -notmatch '(BlueprintReaderMcp|Tests)' -and $_.Length -gt 1MB } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $setup) {
            Write-Error "Toolbox exe not found after build — check electron-builder output"
            exit 1
          }
          Write-Host "Toolbox exe: $($setup.FullName) ($([math]::Round($setup.Length/1MB,1)) MB)"

      # ── 3. Stage all release assets ────────────────────────────────────────
      - name: Stage release bundles
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          $ver  = & "$env:GITHUB_WORKSPACE\Plugins\BlueprintReader\Binaries\Win64\BlueprintReaderMcp.exe" --version

          # ── Asset 1: complete plugin ZIP ───────────────────────────────────
          # Copy the entire Plugins/BlueprintReader tree (the server exe is
          # already in Binaries/Win64/ from the CMake build step above) but
          # exclude build artifacts so the ZIP stays lean.
          $pluginSrc  = "$env:GITHUB_WORKSPACE\Plugins\BlueprintReader"
          $pluginStage = "plugin-stage\BlueprintReader"
          New-Item -ItemType Directory -Force $pluginStage | Out-Null
          & robocopy $pluginSrc $pluginStage /MIR /NFL /NDL /NJH /NJS /NP `
            /XD "Intermediate" `
            /XD "$pluginSrc\Binaries\Toolbox" `
            /XD "$pluginSrc\Toolbox\node_modules" `
            /XD "$pluginSrc\Toolbox\dist" `
            /XD "$pluginSrc\Toolbox\electron-dist" `
            /XF "*.pdb" "*.ilk" "*.exp" "*.lib" | Out-Null
          # robocopy exit 0-7 = success; 8+ = error.
          # Reset LASTEXITCODE: robocopy exits 1 ("files copied") which
          # GitHub Actions pwsh would otherwise interpret as a step failure.
          if ($LASTEXITCODE -ge 8) { throw "robocopy failed ($LASTEXITCODE)" }
          $global:LASTEXITCODE = 0
          # Write a VERSION.txt so users can verify what they downloaded
          Set-Content "$pluginStage\VERSION.txt" -Value $ver
          $pluginZip = "BlueprintReader-$tag-plugin.zip"
          Compress-Archive -Path "plugin-stage\*" -DestinationPath $pluginZip -Force
          Write-Host "Plugin bundle: $pluginZip ($([math]::Round((Get-Item $pluginZip).Length/1MB,1)) MB)"

          # ── Asset 2: Toolbox installer ─────────────────────────────────────
          $toolboxInstaller = Get-ChildItem -Recurse `
            "$env:GITHUB_WORKSPACE\Plugins\BlueprintReader" `
            -ErrorAction SilentlyContinue |
            Where-Object { $_.Extension -eq '.exe' -and $_.Name -notmatch '(BlueprintReaderMcp|Tests)' -and $_.Length -gt 1MB } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if ($toolboxInstaller) {
            $toolboxDst = "BlueprintReader-$tag-toolbox-win64.exe"
            Copy-Item $toolboxInstaller.FullName $toolboxDst
            Write-Host "Toolbox exe: $toolboxDst ($([math]::Round($toolboxInstaller.Length/1MB,1)) MB)"
          }

      # ── 4. Upload workflow artifacts (always — even on workflow_dispatch) ──
      - name: Upload plugin ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlueprintReader-plugin
          path: BlueprintReader-*-plugin.zip
          if-no-files-found: error

      - name: Upload Toolbox portable exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlueprintReader-toolbox
          path: BlueprintReader-*-toolbox-win64.exe
          if-no-files-found: warn

      # ── 5. Attach all assets to the GitHub Release (tag pushes only) ──────
      - name: Create / update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BlueprintReader-*-plugin.zip
            BlueprintReader-*-toolbox-win64.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            BlueprintReader is a standalone MCP server that gives AI coding assistants
            (Claude, Copilot, Cursor, Gemini, Codex) deep read/write access to every
            asset type inside a running Unreal Engine project — Blueprints, Materials,
            DataTables, AnimBPs, Niagara, Sequencer, and more — without requiring any
            C++ or editor scripting knowledge.

            ## What's new in v0.4.0

            ### Toolbox — desktop GUI for setup and testing
            A new Electron app ships alongside the plugin. It provides a guided
            installer, an AI-provider configuration screen for every supported client
            (Claude Desktop, VS Code, Cursor, Windsurf, Gemini CLI, Codex), and a
            live MCP tester where you can call any of the 252 tools interactively and
            inspect the JSON response. No terminal required for initial setup.

            ### Blueprint recreation at diff=0
            Two new tools — `clone_graph` and `implement_interface` — round out the
            write surface. Combined with the existing node/pin/connection authoring
            tools, the server can now reproduce any Blueprint from scratch with zero
            structural residuals: correct wiring topology, macro sub-graphs, composite
            graphs, custom event parameters, interface override signatures, self-context
            calls, and object-valued TMaps. Verified against a full corpus of real
            Lyra Blueprints.

            ### UE 5.8 support and installed-engine fallback
            The plugin and MCP server now build and run against Unreal Engine 5.8,
            including binary/Launcher installs. Because installed engines refuse to
            build UE Program targets, the MCP server and test suite now have a CMake
            fallback that builds them as standalone executables using only the system
            MSVC toolchain — no engine required. The `Setup-Plugin.bat` installer
            detects this automatically and runs the CMake build on first use.

            ### MCP protocol 2025-11-25 + typed output schemas
            The server now speaks MCP protocol `2025-11-25` with `structuredContent`
            responses, meaning AI clients receive tool outputs as structured JSON
            objects rather than opaque text. Every one of the 252 tools now declares
            a full `output_schema` — clients can validate, display, and reason over
            the response shape without parsing strings.

            ### Auto-backend reliability
            The `auto` backend (default) probes whether the editor is running on each
            call and routes to the live TCP socket or a headless commandlet accordingly.
            This release fixes the two main reliability gaps: stale cached sockets
            after an editor restart now reconnect transparently, and the spawned daemon
            is cleanly released when switching to a live editor session mid-run.

            ### New and improved tools
            - **`read_actor_instance`** — reads any UObject or OFPA per-actor-instance
              override directly (real property values, not just class defaults).
            - **`find_asset` pagination** — large asset registries no longer error;
              results paginate with a configurable page size.
            - **Daemon spawn retry** — transient editor-startup failures are retried
              automatically rather than propagating immediately to the caller.
            - **Did-you-mean hints** — unknown `fields` projections, `category`
              filters, and `add_node` kind names now suggest the closest valid value.
            - **Progress streaming** — long-running operations (`apply_ops`, graph
              reads) emit granular MCP progress notifications so clients show real-time
              status rather than a silent wait.

            ### Broader AI client support
            The config writer now generates ready-to-paste snippets for **Cursor**,
            **Windsurf**, **VS Code**, **Gemini CLI**, and **OpenAI Codex** in addition
            to the existing Claude Desktop / Claude Code targets. The plugin also ships
            a portable `AGENTS.md` that Copilot, Cursor, and other tool-aware clients
            pick up automatically to learn what the MCP server exposes.

            ### Governance and diagnostics
            A new allow/block regex layer lets you restrict which Blueprint paths and
            tool names the server will act on — useful for locking down shared
            environments. `BlueprintReaderMcp.exe doctor` now checks engine
            compatibility, server staleness, and `.mcp.json` correctness and reports
            actionable fixes.

            ---

            ## Install

            **Option A — Plugin bundle** *(recommended, no build step)*
            Download **`BlueprintReader-${{ github.ref_name }}-plugin.zip`**, unzip it,
            and drop the `BlueprintReader/` folder into `<YourProject>/Plugins/`.
            Run `Setup-Plugin.bat` — it builds the server if needed, configures your
            AI clients, and runs a health check.

            **Option B — Toolbox (portable)**
            Download **`BlueprintReader-${{ github.ref_name }}-toolbox-win64.exe`**
            and double-click it — no installation required. The Toolbox walks you
            through project selection, AI client configuration, and lets you test
            the MCP connection before closing.

            ```
            BlueprintReaderMcp.exe --version   # confirm version
            BlueprintReaderMcp.exe doctor      # full environment health check
            ```
