name: Release MCP server

# Builds the standalone BlueprintReaderMcp.exe via the engine-free CMake
# fallback (Plugins/BlueprintReader/Tests/CMakeLists.txt) and publishes it as a
# downloadable asset, so consumers can grab a prebuilt server instead of
# building it. The exe is pure C++20 (bCompileAgainstEngine=false) and
# engine-version-independent — a binary built here drives a UE 5.x editor the
# same as a locally-built one. The version stamp (BPR_VERSION + git short-hash,
# INSTALL-1) is baked in at configure time, so `--version` on the downloaded
# exe reports the tag it was built from.
#
#   * push a tag `v*`  -> build, smoke, and attach the bundle to the GitHub Release
#   * workflow_dispatch -> build + smoke + upload as a workflow artifact (no Release)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create / upload release assets

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history + tags so the git-hash version stamp resolves

      - name: Set up MSVC toolchain
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: Configure (CMake + Ninja, RelWithDebInfo)
        run: cmake -S Plugins/BlueprintReader/Tests -B build/mcp -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build (server + tests)
        # Serial: the heavy TUs (BlueprintTools.cpp etc.) each need a lot of
        # compiler heap; -j 1 keeps the hosted runner from OOMing (C1060).
        run: cmake --build build/mcp -j 1

      - name: Smoke (mock suite + --version)
        shell: pwsh
        env:
          BP_READER_BACKEND: mock
        run: |
          & "$env:GITHUB_WORKSPACE\Plugins\BlueprintReader\Binaries\Win64\BlueprintReaderMcpTests.exe"
          if ($LASTEXITCODE -ne 0) { Write-Host "doctest suite failed ($LASTEXITCODE)"; exit 1 }
          & "$env:GITHUB_WORKSPACE\Plugins\BlueprintReader\Binaries\Win64\BlueprintReaderMcp.exe" --version

      - name: Stage release bundle
        shell: pwsh
        run: |
          $stage = "release-bundle"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item "Plugins\BlueprintReader\Binaries\Win64\BlueprintReaderMcp.exe" $stage
          Copy-Item -Recurse "Plugins\BlueprintReader\Binaries\Win64\fixtures" "$stage\fixtures"
          Copy-Item ".mcp.json.example" $stage
          $ver = & "$env:GITHUB_WORKSPACE\Plugins\BlueprintReader\Binaries\Win64\BlueprintReaderMcp.exe" --version
          Set-Content "$stage\VERSION.txt" -Value $ver
          $tag = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          Compress-Archive -Path "$stage\*" -DestinationPath "BlueprintReaderMcp-$tag-win64.zip" -Force

      - name: Upload workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: BlueprintReaderMcp-win64
          path: BlueprintReaderMcp-*-win64.zip
          if-no-files-found: error

      - name: Attach to GitHub Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: BlueprintReaderMcp-*-win64.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
          body: |
            **Prebuilt BlueprintReaderMcp.exe** (Win64, engine-version-independent).

            Download `BlueprintReaderMcp-*-win64.zip`, unzip, and point your MCP
            client at `BlueprintReaderMcp.exe` — copy `.mcp.json.example` or run
            `BlueprintReaderMcp.exe config --client=claude-code` (also `cursor`,
            `windsurf`, `copilot`, `vscode`, `gemini`, `codex`). The bundled
            `fixtures/` enable the mock backend with no UE install; point
            `BP_READER_PROJECT` at a `.uproject` for live/commandlet work.

            Verify with `BlueprintReaderMcp.exe --version` (matches this tag).
